# Step 3: Dataset + selection + one normalization parameter.
# A single free normalization parameter is read from parameters.txt (one bin
# covering all pmu → one parameter).  This is the minimal config that makes a
# systematic parameter affect event counts — the foundation for all dial studies.
# Run from the project root: gundamFitter -c basic_gundam_example/03_load_dataset_selection_normparam.yaml

outputFolder: "./output/basic_gundam_example/03"

fitterEngineConfig:

  minimizerConfig:
    type: "RootMinimizer"

  likelihoodInterfaceConfig:

    dataSetList:
      - name: "My dataset 1"

        model:

          filePathList:
            - "./super_advanced_gundam_example/inputs/datasets/mydataset.root"

          tree: "events"

          selectionCutFormula: "selection != -1"

          nominalWeightFormula:
            - "asimovWeight"
            
    propagatorConfig:

      sampleSetConfig:
        sampleList:
          - name: "Selection 1"
            isEnabled: true
            selectionCutStr: "selection == 1"
            binning: "./basic_gundam_example/selection_1d.txt"
            dataSets: [ "My dataset 1" ]

      parametersManagerConfig:
        parameterSetList:
          - name: "Free normalization"
            isEnabled: true
            nominalStepSize: 0.1
            useOnlyOneParameterPerEvent: true
            dialSetDefinitions:
              - applyOnDataSets: [ "My dataset 1" ]
                parametersBinningPath: "./basic_gundam_example/parameters.txt"
