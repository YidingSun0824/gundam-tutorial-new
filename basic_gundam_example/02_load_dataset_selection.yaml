# Step 2: Dataset + selection.
# Adds a selectionCutStr that picks topology "selection == 1" from the dataset.
# Events are binned in 2D (pmu x pp) using the shared binning file.
# No parameters — event weights are nominal (asimovWeight) only.
# Run from the project root: gundamFitter -c basic_gundam_example/02_load_dataset_selection.yaml

outputFolder: "./output/basic_gundam_example/02"

fitterEngineConfig:

  minimizerConfig:
    type: "RootMinimizer"

  likelihoodInterfaceConfig:

    dataSetList: #"./inputs/datasets/config.yaml"
      - name: "My dataset 1"

        model:

          filePathList:
            - "./inputs/datasets/mydataset.root"

          tree: "events"

          selectionCutFormula: "selection != -1"

          nominalWeightFormula:
            - "asimovWeight"
            
    propagatorConfig:

      sampleSetConfig:
        sampleList:
          - name: "Selection 1"
            isEnabled: true
            selectionCutStr: "selection == 1"
            binning: "./inputs/samples/binnings/selection1.txt"
            dataSets: [ "My dataset 1" ]

      parametersManagerConfig:
        parameterSetList: []
