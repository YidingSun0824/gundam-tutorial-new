# Step 3: Dataset + selection + one normalization parameter.
# Adds a single Gaussian normalization parameter that multiplies the weight of
# every event in the dataset.  This is the minimal config that makes a systematic
# parameter affect event counts — the foundation for all further dial studies.
# Run from the project root: gundamFitter -c basic_gundam_example/03_load_dataset_selection_normpar.yaml

outputFolder: "./output/basic_gundam_example/03"

fitterEngineConfig:

  minimizerConfig:
    type: "RootMinimizer"

  likelihoodInterfaceConfig:

    dataSetList:
      - name: "My dataset 1"

        model:

          filePathList:
            - "./inputs/datasets/mydataset.root"

          tree: "events"

          selectionCutFormula: "selection != -1"

          nominalWeightFormula:
            - "asimovWeight"
            
    propagatorConfig:

      sampleSetConfig:
        sampleList:
          - name: "Selection 1"
            isEnabled: true
            selectionCutStr: "selection == 1"
            binning: "./inputs/samples/binnings/selection1.txt"
            dataSets: [ "My dataset 1" ]

      parametersManagerConfig:
        parameterSetList:
          - name: "Normalization parameters"
            isEnabled: true
            nominalStepSize: 0.1
            parameterDefinitions:
              - name: "norm_sel1"
                isEnabled: true
                priorType: Gaussian
                priorValue: 1.0
                isFixed: false
                isThrown: false
                parameterStepSize: 0.1
                parameterLimits: [0.0, 2.0]
                physicalLimits: [0.0, 2.0]
                throwLimits: [0.0, 2.0]
                dialSetDefinitions:
                  - dialType: Normalization
                    applyOnDataSets: [ "My dataset 1" ]
