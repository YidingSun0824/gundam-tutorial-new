



parameterSetList:
  - name: "List of correlated normalization parameters"
    isEnabled: true # default: true

    # example of parameters defined with a covariance matrix

    useEigenDecompInFit: false # false by default
    allowPca: false # false by default

    covarianceMatrixFilePath: "./advanced/inputs/parameters/flux/covarianceFile.root"
    covarianceMatrixTMatrixD: "covarianceMatrix"

    # knowing that makes it faster to load
    useOnlyOneParameterPerEvent: true

    dialSetDefinitions:
      - applyOnDataSets: [ "*" ]
        parametersBinningPath: "./advanced/inputs/parameters/flux/binning.txt"
        printDialsSummary: true
    printDialSetsSummary: true


  - name: "List of Free Normalization parameters"
    isEnabled: true # default: true

    nominalStepSize: 0.1

    # as the template parameters are defined with a true binning, we only expect one parameter to apply on each event
    useOnlyOneParameterPerEvent: true

    # here you can define the binning of the template parameters
    dialSetDefinitions:
      - applyOnDataSets: [ "*" ]
        # the true variables will be defined here:
        parametersBinningPath: "./advanced/inputs/parameters/free/binning.txt"
#        applyCondition: ""


  - name: "Dummy Systematics"
    isEnabled: true

    nominalStepSize: 0.1

    parameterDefinitions:

      # ── Normalization ──────────────────────────────────────────────────────
      # Multiplies matched events by the parameter value.  No external input.
      # type-specific option: parametersBinningPath (optional, bin-by-bin norm)
      - name: "Gaussian Normalization parameter"
        isEnabled: true
        priorType: Gaussian
        priorValue: 1.0
        isFixed: false
        isThrown: false
        parameterStepSize: 0.1
        parameterLimits: [0.0, 2.0]
        physicalLimits: [0.0, 2.0]
        throwLimits: [0.0, 2.0]
        dialSetDefinitions:
          - dialType: Normalization
            applyOnDataSets: [ "my dataset 1" ]

      - name: "Flat Normalization parameter with selection condition"
        isEnabled: true
        priorType: Flat
        priorValue: 1.0
        isFixed: false
        isThrown: false
        parameterStepSize: 0.1
        parameterLimits: [0.0, 2.0]
        physicalLimits: [0.0, 2.0]
        throwLimits: [0.0, 2.0]
        dialSetDefinitions:
          - dialType: Normalization
            applyOnDataSets: [ "my dataset 1" ]
            applyCondition: "selection == 1"

      # ── Graph ─────────────────────────────────────────────────────────────
      # Per-event linear interpolation from a TClonesArray<TGraph> branch.
      # Same branch requirement as Spline.
      # type-specific options: dialLeafName, dialsFilePath, dialsList
      - name: "Graph interpolation parameter"
        isEnabled: false
        priorType: Gaussian
        priorValue: 1.0
        isFixed: false
        isThrown: false
        parameterStepSize: 0.1
        parameterLimits: [0.0, 2.0]
        physicalLimits: [0.0, 2.0]
        throwLimits: [0.0, 2.0]
        dialSetDefinitions:
          - dialType: Graph
            dialLeafName: par3_TGraph
            applyOnDataSets: [ "My dataset 1" ]
            allowDialExtrapolation: false
            minDialResponse: 0.0
            maxDialResponse: 3.0

      # ── Spline ────────────────────────────────────────────────────────────
      # Per-event spline built from a TClonesArray<TGraph> branch.
      # All entries below are disabled documentation examples; enable only after
      # the spline response format (par_value, weight knots) is fully validated.
      # type-specific options: dialLeafName, dialsFilePath, dialsList, dialSubType
      #   dialSubType: not-a-knot | natural | catmull-rom | akima
      #                monotonic, <any of the above>
      #                uniformity(<tolerance>)   e.g. uniformity(1E-3)

      - name: "Spline: not-a-knot (default)"
        isEnabled: false
        priorValue: 1.0
        isFixed: false
        isThrown: false
        parameterStepSize: 0.1
        parameterLimits: [0.0, 2.0]
        physicalLimits: [0.0, 2.0]
        throwLimits: [0.0, 2.0]
        dialSetDefinitions:
          - dialType: Spline
            dialSubType: "not-a-knot"
            dialLeafName: par2_TGraph
            applyOnDataSets: [ "My dataset 1" ]
            allowDialExtrapolation: false
            useMirrorDial: false
            minDialResponse: 0.0
            maxDialResponse: 3.0

      - name: "Spline: natural"
        isEnabled: false
        priorValue: 1.0
        isFixed: false
        isThrown: false
        parameterStepSize: 0.1
        parameterLimits: [0.0, 2.0]
        physicalLimits: [0.0, 2.0]
        throwLimits: [0.0, 2.0]
        dialSetDefinitions:
          - dialType: Spline
            dialSubType: "natural"
            dialLeafName: par2_TGraph
            applyOnDataSets: [ "My dataset 1" ]
            allowDialExtrapolation: false
            useMirrorDial: false
            minDialResponse: 0.0
            maxDialResponse: 3.0

      - name: "Spline: catmull-rom"
        isEnabled: false
        priorValue: 1.0
        isFixed: false
        isThrown: false
        parameterStepSize: 0.1
        parameterLimits: [0.0, 2.0]
        physicalLimits: [0.0, 2.0]
        throwLimits: [0.0, 2.0]
        dialSetDefinitions:
          - dialType: Spline
            dialSubType: "catmull-rom"
            dialLeafName: par2_TGraph
            applyOnDataSets: [ "My dataset 1" ]
            allowDialExtrapolation: false
            useMirrorDial: false
            minDialResponse: 0.0
            maxDialResponse: 3.0

      - name: "Spline: akima"
        isEnabled: false
        priorValue: 1.0
        isFixed: false
        isThrown: false
        parameterStepSize: 0.1
        parameterLimits: [0.0, 2.0]
        physicalLimits: [0.0, 2.0]
        throwLimits: [0.0, 2.0]
        dialSetDefinitions:
          - dialType: Spline
            dialSubType: "akima"
            dialLeafName: par3_TGraph
            applyOnDataSets: [ "My dataset 1" ]
            allowDialExtrapolation: false
            useMirrorDial: false
            minDialResponse: 0.0
            maxDialResponse: 3.0

      - name: "Spline: monotonic, not-a-knot"
        isEnabled: false
        priorValue: 1.0
        isFixed: false
        isThrown: false
        parameterStepSize: 0.1
        parameterLimits: [0.0, 2.0]
        physicalLimits: [0.0, 2.0]
        throwLimits: [0.0, 2.0]
        dialSetDefinitions:
          - dialType: Spline
            dialSubType: "monotonic, not-a-knot"
            dialLeafName: par2_TGraph
            applyOnDataSets: [ "My dataset 1" ]
            allowDialExtrapolation: false
            useMirrorDial: false
            minDialResponse: 0.0
            maxDialResponse: 3.0

      - name: "Spline: monotonic, natural"
        isEnabled: false
        priorValue: 1.0
        isFixed: false
        isThrown: false
        parameterStepSize: 0.1
        parameterLimits: [0.0, 2.0]
        physicalLimits: [0.0, 2.0]
        throwLimits: [0.0, 2.0]
        dialSetDefinitions:
          - dialType: Spline
            dialSubType: "monotonic, natural"
            dialLeafName: par2_TGraph
            applyOnDataSets: [ "My dataset 1" ]
            allowDialExtrapolation: false
            useMirrorDial: false
            minDialResponse: 0.0
            maxDialResponse: 3.0

      - name: "Spline: monotonic, catmull-rom"
        isEnabled: false
        priorValue: 1.0
        isFixed: false
        isThrown: false
        parameterStepSize: 0.1
        parameterLimits: [0.0, 2.0]
        physicalLimits: [0.0, 2.0]
        throwLimits: [0.0, 2.0]
        dialSetDefinitions:
          - dialType: Spline
            dialSubType: "monotonic, catmull-rom"
            dialLeafName: par2_TGraph
            applyOnDataSets: [ "My dataset 1" ]
            allowDialExtrapolation: false
            useMirrorDial: false
            minDialResponse: 0.0
            maxDialResponse: 3.0

      - name: "Spline: monotonic, akima"
        isEnabled: false
        priorValue: 1.0
        isFixed: false
        isThrown: false
        parameterStepSize: 0.1
        parameterLimits: [0.0, 2.0]
        physicalLimits: [0.0, 2.0]
        throwLimits: [0.0, 2.0]
        dialSetDefinitions:
          - dialType: Spline
            dialSubType: "monotonic, akima"
            dialLeafName: par3_TGraph
            applyOnDataSets: [ "My dataset 1" ]
            allowDialExtrapolation: false
            useMirrorDial: false
            minDialResponse: 0.0
            maxDialResponse: 3.0

      - name: "Spline: uniformity(1E-3)"
        isEnabled: false
        priorValue: 1.0
        isFixed: false
        isThrown: false
        parameterStepSize: 0.1
        parameterLimits: [0.0, 2.0]
        physicalLimits: [0.0, 2.0]
        throwLimits: [0.0, 2.0]
        dialSetDefinitions:
          - dialType: Spline
            dialSubType: "uniformity(1E-3)"
            dialLeafName: par2_TGraph
            applyOnDataSets: [ "My dataset 1" ]
            allowDialExtrapolation: false
            useMirrorDial: false
            minDialResponse: 0.0
            maxDialResponse: 3.0


      # ── Surface ───────────────────────────────────────────────────────────
      # 2-D interpolation over a dial surface stored in an external ROOT file.
      # Enable after providing dialsFilePath.
      # type-specific options: dialLeafName, dialsFilePath, dialsList, dialSubType
      #   dialSubType: Bilinear | Bicubic
      - name: "Par4"
        isEnabled: false
        priorType: Flat
        priorValue: 1.0
        isFixed: false
        isThrown: false
        parameterStepSize: 0.1
        parameterLimits: [0.0, 2.0]
        physicalLimits: [0.0, 2.0]
        throwLimits: [0.0, 2.0]
        dialSetDefinitions:
          - dialType: Surface
            dialSubType: Bilinear
            dialLeafName: par1_TGraph        # placeholder
            applyOnDataSets: [ "My dataset 1" ]
            allowDialExtrapolation: false
            # dialsFilePath: "./advanced/inputs/parameters/surface/surface.root"

      # ── Tabulated ─────────────────────────────────────────────────────────
      # Weight read from a pre-computed lookup table.
      # Enable after filling tableConfig with a real table source.
      # type-specific option: tableConfig
      - name: "Par5"
        isEnabled: false
        priorType: Flat
        priorValue: 1.0
        isFixed: false
        isThrown: false
        parameterStepSize: 0.1
        parameterLimits: [0.0, 2.0]
        physicalLimits: [0.0, 2.0]
        throwLimits: [0.0, 2.0]
        dialSetDefinitions:
          - dialType: Tabulated
            applyOnDataSets: [ "My dataset 1" ]
            tableConfig: {}                  # placeholder — replace with real config

      # ── Kriged ────────────────────────────────────────────────────────────
      # Gaussian-process interpolation over scattered dial samples.
      # Enable after filling tableConfig with kriging source data.
      # type-specific option: tableConfig
      - name: "Par6"
        isEnabled: false
        priorType: Flat
        priorValue: 1.0
        isFixed: false
        isThrown: false
        parameterStepSize: 0.1
        parameterLimits: [0.0, 2.0]
        physicalLimits: [0.0, 2.0]
        throwLimits: [0.0, 2.0]
        dialSetDefinitions:
          - dialType: Kriged
            applyOnDataSets: [ "My dataset 1" ]
            tableConfig: {}                  # placeholder — replace with real config

      # ── Formula ───────────────────────────────────────────────────────────
      # Weight computed by a ROOT TFormula evaluated per event.
      # NOTE: not GPU-accelerated — avoid in large-scale fits.
      # Enable after writing a valid ROOT formula string.
      - name: "Par7"
        isEnabled: false
        priorType: Flat
        priorValue: 1.0
        isFixed: false
        isThrown: false
        parameterStepSize: 0.1
        parameterLimits: [0.0, 2.0]
        physicalLimits: [0.0, 2.0]
        throwLimits: [0.0, 2.0]
        dialSetDefinitions:
          - dialType: Formula
            applyOnDataSets: [ "My dataset 1" ]
            # formula: "1 + [0]*x"           # replace with actual ROOT expression


