# Step 1: Load dataset only.
# Verifies that the ROOT file opens, the event tree is readable, and the
# dataset-level cut (selection != -1) is applied.  No sample binning, no parameters.
# Run from the project root: gundamFitter -c example/basic/B01_load_dataset.yaml

outputFolder: "./output/basic/B01"

fitterEngineConfig:

  minimizerConfig:
    type: "RootMinimizer"

  likelihoodInterfaceConfig:

    dataSetList:
      - name: "My dataset 1"

        model:

          filePathList:
            - "./example/advanced/inputs/datasets/mydataset.root"

          tree: "events"

          selectionCutFormula: "selection != -1"

          nominalWeightFormula:
            - "asimovWeight"

    propagatorConfig:

      sampleSetConfig:
        sampleList:
          - name: "All selected events"
            isEnabled: true
            dataSets: [ "My dataset 1" ]

      parametersManagerConfig:
        parameterSetList: []
