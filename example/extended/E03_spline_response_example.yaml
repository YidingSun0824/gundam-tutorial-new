# Step 6: Spline response function (disabled example).
# Builds on step 5. Adds a Spline dial reading the par2_TGraph branch from the
# dataset.  The Spline parameter set is disabled (isEnabled: false) until the
# response function knots are validated.
# Run from the project root: gundamFitter -c example/extended/E03_spline_response_example.yaml

outputFolder: "./output/extended/E03"

fitterEngineConfig:

  minimizerConfig:
    type: "RootMinimizer"

  likelihoodInterfaceConfig:

    dataSetList:
      - name: "My dataset 1"

        model:

          filePathList:
            - "./example/advanced/inputs/datasets/mydataset.root"

          tree: "events"

          selectionCutFormula: "selection != -1"

          nominalWeightFormula:
            - "asimovWeight"

    propagatorConfig:

      sampleSetConfig:
        sampleList:
          - name: "Selection 1 (1D: pmu)"
            isEnabled: true
            selectionCutStr: "selection == 1"
            binning: "./example/extended/selection_1d.txt"
            dataSets: [ "My dataset 1" ]

          - name: "Selection 2 (2D: pmu x pp)"
            isEnabled: true
            selectionCutStr: "selection == 2"
            binning: "./example/extended/selection_2d.txt"
            dataSets: [ "My dataset 1" ]

          - name: "Selection 3 (3D: enu x pmu x pp)"
            isEnabled: true
            selectionCutStr: "selection == 3"
            binning: "./example/extended/selection_3d.txt"
            dataSets: [ "My dataset 1" ]

      parametersManagerConfig:
        parameterSetList:
          - name: "Free normalization parameters"
            isEnabled: true
            nominalStepSize: 0.1
            useOnlyOneParameterPerEvent: true
            dialSetDefinitions:
              - applyOnDataSets: [ "My dataset 1" ]
                parametersBinningPath: "./example/extended/parameters.txt"

          - name: "Spline response (disabled)"
            isEnabled: false
            nominalStepSize: 0.1
            parameterDefinitions:
              - name: "par2_spline"
                isEnabled: false
                priorValue: 1.0
                isFixed: false
                isThrown: false
                parameterStepSize: 0.1
                parameterLimits: [-3.0, 3.0]
                dialSetDefinitions:
                  - dialType: Spline
                    dialSubType: "not-a-knot"
                    dialLeafName: par2_TGraph
                    applyOnDataSets: [ "My dataset 1" ]
                    allowDialExtrapolation: false
                    minDialResponse: 0.0
                    maxDialResponse: 3.0
