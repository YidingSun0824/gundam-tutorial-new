# Step 7: Correlated normalization parameters via covariance matrix.
# Builds on step 4. Replaces free norm parameters with a covariance-matrix-
# driven parameter set.  The covariance matrix and binning are read from local
# files inside advanced/ (no Super Advanced files are referenced).
# Run from the project root: gundamFitter -c advanced/07_correlated_norm_parameters.yaml

outputFolder: "./output/advanced/07"

fitterEngineConfig:

  minimizerConfig:
    type: "RootMinimizer"

  likelihoodInterfaceConfig:

    dataSetList:
      - name: "My dataset 1"

        model:

          filePathList:
            - "./example/advanced/inputs/datasets/mydataset.root"

          tree: "events"

          selectionCutFormula: "selection != -1"

          nominalWeightFormula:
            - "asimovWeight"

    propagatorConfig:

      sampleSetConfig:
        sampleList:
          - name: "Selection 1 (1D: pmu)"
            isEnabled: true
            selectionCutStr: "selection == 1"
            binning: "./example/extended/selection_1d.txt"
            dataSets: [ "My dataset 1" ]

          - name: "Selection 2 (2D: pmu x pp)"
            isEnabled: true
            selectionCutStr: "selection == 2"
            binning: "./example/extended/selection_2d.txt"
            dataSets: [ "My dataset 1" ]

          - name: "Selection 3 (3D: enu x pmu x pp)"
            isEnabled: true
            selectionCutStr: "selection == 3"
            binning: "./example/extended/selection_3d.txt"
            dataSets: [ "My dataset 1" ]

      parametersManagerConfig:
        parameterSetList:
          - name: "Correlated normalization parameters"
            isEnabled: true
            useEigenDecompInFit: false
            allowPca: false
            useOnlyOneParameterPerEvent: true
            covarianceMatrixFilePath: "./example/extended/covarianceFile.root"
            covarianceMatrixTMatrixD: "covarianceMatrix"
            dialSetDefinitions:
              - applyOnDataSets: [ "My dataset 1" ]
                parametersBinningPath: "./example/extended/correlated_parameters.txt"
