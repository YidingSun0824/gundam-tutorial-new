# Step 2: Dataset + selection.
# Adds a selectionCutStr that picks topology "selection == 1" from the dataset.
# Events are binned in 1D (pmu) using the local selection_1d.txt file.
# No parameters — event weights are nominal (asimovWeight) only.
# Run from the project root: gundamFitter -c basic/02_load_dataset_selection.yaml

outputFolder: "./output/basic/02"

fitterEngineConfig:

  minimizerConfig:
    type: "RootMinimizer"

  likelihoodInterfaceConfig:

    dataSetList:
      - name: "My dataset 1"

        model:

          filePathList:
            - "./advanced/inputs/datasets/mydataset.root"

          tree: "events"

          selectionCutFormula: "selection != -1"

          nominalWeightFormula:
            - "asimovWeight"
            
    propagatorConfig:

      sampleSetConfig:
        sampleList:
          - name: "Selection 1"
            isEnabled: true
            selectionCutStr: "selection == 1"
            binning: "./basic/selection_1d.txt"
            dataSets: [ "My dataset 1" ]

      parametersManagerConfig:
        parameterSetList: []
